# Flagbit-Upstream Allowlist
#
# Diese Datei steuert, welche Artefakte aus upstream/flagbit/ nach config/_vendored/
# synchronisiert werden. Nur explizit gelistete Skills/Rules fliessen ein.
#
# Wird von sync-upstream.sh gesourced. Bash-Syntax.

FLAGBIT_SKILLS=(
  framework-nextjs
  framework-fastapi
  framework-shadcn
  database-postgresql
  database-mysql
  devops-coolify
  devops-github-actions
  workflow-git-clean-push
  workflow-commit
  ai-skill-builder
)

FLAGBIT_RULES=(
  skill-opportunity.md
)

# Bewusst leer — Runprise verwendet keine Flagbit-Hooks/Agents/Commands
FLAGBIT_HOOKS=()
FLAGBIT_AGENTS=()
FLAGBIT_COMMANDS=()

# Libs: einmalig nach lib/ kopiert, danach Runprise-owned (sync zeigt nur Diff)
FLAGBIT_LIBS=(
  merge-settings.js
)
